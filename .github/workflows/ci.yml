name: CI

on:
  pull_request:
    # Runs on feature PRs targeting develop AND on the release PR from develop → master.
    branches: [develop, master]
  push:
    # Continuous integration on the development branch.
    branches: [develop]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          path: ~/.local/share/pnpm/store
          restore-keys: pnpm-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          LEFTHOOK: '0'

      - run: pnpm run lint

  # ── Build web SPA ────────────────────────────────────────────────────────────
  build-web:
    name: Build web SPA
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          path: ~/.local/share/pnpm/store
          restore-keys: pnpm-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          LEFTHOOK: '0'

      - run: pnpm run pack:web

  # ── Server tests ─────────────────────────────────────────────────────────────
  test-server:
    name: Server tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run server tests
        working-directory: server
        run: npm test
